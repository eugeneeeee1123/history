<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人物画廊 GALLERY — 史阅 THE ARCHIVUM</title>
<meta name="description" content="全部 121 位人物一览，可按大洲与身份筛选。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,500&family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="grain" aria-hidden="true"></div>

<header class="topbar">
  <a class="brand" href="index.html" aria-label="返回首页">
    <span class="seal" id="brandSeal"></span>
    <span class="brand-text"><span class="brand-zh">史阅</span><span class="brand-en">THE ARCHIVUM</span></span>
  </a>
  <nav class="topnav">
    <button class="tbtn" data-nav-key="home" data-page="index.html" onclick="location.href='index.html'"><span class="full">首页</span></button>
    <button class="tbtn" data-nav-key="asia" data-page="asia.html" onclick="location.href='asia.html'"><span class="full">亚洲</span></button>
    <button class="tbtn" data-nav-key="europe" data-page="europe.html" onclick="location.href='europe.html'"><span class="full">欧洲</span></button>
    <button class="tbtn" data-nav-key="americas" data-page="americas.html" onclick="location.href='americas.html'"><span class="full">美洲</span></button>
    <button class="tbtn" data-nav-key="gallery" data-page="gallery.html" onclick="location.href='gallery.html'"><span class="full">画廊</span></button>
    <button class="tbtn" data-nav-key="about" data-page="about.html" onclick="location.href='about.html'"><span class="full">关于</span></button>
    <button class="tbtn" data-nav-key="contact" data-page="contact.html" onclick="location.href='contact.html'"><span class="full">联系</span></button>
    <button class="tbtn" id="searchToggle"><span class="full" data-i18n="nav.search">检索</span> ⌕</button>
    <button class="tbtn ghost lang-pill" id="langToggle">EN</button>
  </nav>
</header>

<div class="search-overlay" id="searchOverlay" role="dialog" aria-label="搜索">
  <button class="search-close" id="searchClose" aria-label="关闭搜索">✕</button>
  <div class="search-box">
    <input type="text" class="search-input" id="searchInput" placeholder="搜索时代、人物、朝代……" autocomplete="off">
    <div class="search-hint" data-i18n="search.hint">按名称搜索 3 大区域 · 46 个时代 · 121 位人物</div>
  </div>
  <div class="search-results" id="searchResults"></div>
</div>

<main>
  <div class="civ-hero" style="--civ:#c9a35f;--civ-soft:rgba(201,163,95,.12)">
    <a class="back-link" href="index.html">← <span data-i18n="back">返回首页</span></a>
    <div class="civ-hero-eyebrow" data-i18n="gallery.eyebrow">THE FULL ROSTER</div>
    <h2 class="civ-hero-title" data-i18n="gallery.title">人物画廊</h2>
    <p class="civ-hero-desc" data-i18n="gallery.note">全部 121 位人物一览，可按大洲与身份筛选。</p>
  </div>

  <div class="section">
    <div class="gallery-controls">
      <div class="gal-filter-group">
        <div class="sb-label" data-i18n="gallery.filter.region">按大洲</div>
        <div class="gal-filter-row" id="galRegionFilters"></div>
      </div>
      <div class="gal-filter-group">
        <div class="sb-label" data-i18n="gallery.filter.cat">按身份</div>
        <div class="gal-filter-row" id="galCatFilters"></div>
      </div>
    </div>
    <div class="gal-count" id="galCount"></div>
    <div class="gal-grid" id="galGrid"></div>
  </div>

  <footer class="site-footer">
    <span>史阅 · THE ARCHIVUM — 文明编年史档案</span>
    <span data-i18n="footer.note">内容为历史重述与部分文学改编，用于个人作品展示</span>
  </footer>
</main>

<div class="scrim" id="scrim"></div>
<div class="drawer" id="eraDrawer" role="dialog" aria-label="时代详情">
  <button class="drawer-close" id="eraDrawerClose">✕</button>
  <div id="eraDrawerContent"></div>
</div>
<div class="drawer" id="personDrawer" role="dialog" aria-label="人物档案">
  <button class="drawer-close" id="personDrawerClose">✕</button>
  <div id="personDrawerContent"></div>
</div>

<script src="data.js"></script>
<script src="common.js"></script>
<script src="gallery.js"></script>
</body>
</html>
